<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择器优先级的比较</title>
    <style>
        h1{
            color: #000;
            background-color: white;
        }
        .title{
            color: aquamarine;
            font-family: songti;
        
        }
        #user{
            color: #c01a2a;
            font-size: 30px;
        }
        *{
            font-family: kaiti;
            font-size: 40px;
            color: rgb(197, 24, 96);
        }
        .father .son{
            font-family: songti;
            color: #4c09a442;
        }
        .father > .son{
            color:red;
        }
        .father .grandson{
            font-size: small;

        }
        /* 伪类选择器 */
        #fuction:hover{
            background-color: rgb(26, 100, 165);
        }
        /* 伪元素选择器 */
        ::after{
            background-color: blue;
        }
        /* 伪元素选择器 */
    </style>
</head>
<body>
    <h1 id="fuction">元素选择器</h1>
    <!-- 使用.title -->
    <div class="title">类选择器</div>
    <!-- 使用# -->
     <div id="user">id选择器</div>
     <!-- 这个证明通用选择器>元素选择器 -->
     <h1>这是一个一级标题</h1>
     <span id="fuction">这是背景伪类选择器实例！</span>
     <!-- 这个可以证明优先级：类选择器>大于元素选择器 -->
     <h1 class="title">这是一个一级标题</h1>
     <!-- 这个可以证明id选择器的优先级>通用选择器or元素选择器 -->
     <h1 id="user">这是一个一级标题</h1>
     <div class="title" id="user">比较选择器与id选择器优先级！id选择器完胜！！！</div>
    <div class="father">
        <div class="grandson">
            这是与后代选择器同名的子代选择器实例！
        </div>
        <div>
            <p class="son">这是与子元素选择器同名的后代选择器实例！</p>
            <p class="grandson">这是一个后代选择器实例。</p>
        </div>
        <p class="son">
            这是子元素选择器！
        </p>
    </div>
    ::after
     <!-- 由此总结：优先级：id选择器>类选择器>通用选择其>元素选择器 -->
      <!-- 子元素选择器优先级大于后代选择器！ -->

</body>
</html>
