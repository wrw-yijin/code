<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .block
        {
            background-color: red;
        }
        .inline
        {
            background-color: blue;
        }
        .inline-block
        {
            width: 100px;
            height: 100px;
            background-color: green;
        }
        .div-inline
        {
            display: inline-block;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1 style="font: bold 50px kaiti;">
        哈哈哈！这是一个符合属性实例！
    </h1>
    <p style="line-height: 60px;font-size: 60px;">
        哈哈哈！这是一个符合属性实例！哈哈哈！这是一个符合属性实例！哈哈哈！这是一个符合属性实例！哈哈哈！这是一个符合属性实例！哈哈哈！这是一个符合属性实例！哈哈哈！这是一个符合属性实例！哈哈哈！这是一个符合属性实例！哈哈哈！这是一个符合属性实例！
    </p>
    <div class="block">这是一个块元素！</div>
    <span class="inline">这是一个行内元素！</span>    
    <img src="https://img0.baidu.com/it/u=3591665277,2616537962&fm=253&app=138&f=JPEG?w=800&h=1333" alt="" class="inline-block">这是一个可以在行内的块元素！</img>
    <div class="div-inline">这是一个转换成行内元素的div块元素！</div>
</body>
</html>
