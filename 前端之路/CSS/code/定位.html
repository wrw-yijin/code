<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位</title>
    <style>
        .box1{
            height: 500px;
            background-color: #e827a4a1;
        }
        .box-normal{
            width: 100px;
            height: 100px;
            background-color: rgb(91, 241, 26);
        }
        /* 相对定位：relative不会脱离文档流，但是会占用空间 */
        .box-relative{
            width: 100px;
            height: 100px;
            background-color: rgb(177, 228, 24);
            position: relative;
            left: 100px;
        }
        .box2{
            height: 500px;
            background-color: #27cfb3a1;
        }
        /* 绝对定位：absolute会脱离文档流，但不会占用空间 */
        .box-absolute{
            width: 100px;
            height: 100px;
            background-color: rgb(245, 166, 24);
            position: absolute;
            margin: 50px;
        }
        .box3{
            height: 500px;
            background-color: #27cfb3a1;
        }
        /* 固定定位：fixed会脱离文档流，但不会占用空间 */
        .box-fixed{
            width: 100px;
            height: 100px;
            background-color: rgb(245, 166, 24);
            position: fixed;
            right: 10px;
            bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>相对定位</h1>
    <div class="box1">
        <div class="box-normal"></div>
        <div class="box-relative"></div>
        <div class="box-normal"></div>
    </div>
    <h1>绝对定位</h1>
    <div class="box2">
        <div class="box-normal"></div>
        <div class="box-absolute"></div>
        <div class="box-normal"></div>
    </div>
    <h1>固定定位</h1>
    <div class="box3">
        <div class="box-normal"></div>
        <div class="box-fixed"></div>
        <div class="box-normal"></div>
    </div>
</body>
</html>
