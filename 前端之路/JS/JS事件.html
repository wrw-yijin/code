<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS事件</title>
</head>
<body>
    <div onclick="click_event()"> 事件</div>
    <input type="text" onfocus="focus_event()" onblur="blur_event()"></input>
    <button onclick="submit_password()">提交密码</button>
    <script>
        function click_event() {
            console.log("点击事件触发！");
        }
        function focus_event() {
            console.log("获得焦点事件触发！");
        }
        function blur_event() {
            console.log("失去焦点事件触发！");
        }
        function submit_password() {
            alert("提交密码成功！");
        }
    </script>
</body>
</html>
