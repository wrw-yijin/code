<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS条件判断</title>
</head>
<body>
    <script>
        let age = 20;
        if (age < 18) {
            console.log("未成年");
        } else if (age >= 18 && age < 60) {
            console.log("成年人");
        } else {
            console.log("老年人");
        }
    </script>
</body>
</html>
